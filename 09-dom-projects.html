<!DOCTYPE html>
<html>
  <head>
    <title>DOM Projects</title>
    </title>
  </head>
  <body>
    <p>Youtube subscribe button</p>
    <button onclick="
        subscribe();
      " class="js-button-subscribe">Subscribe</button><br><br>

    <p>Rock Paper Scissor</p>
    <a href="">click here</a> <br><br>


    <p>Amazon Shipping Calculator</p>
    <p>Order under $40 = +$10 shipping</p>
    <p>Order over $40 = Free shipping.</p>
    <input type="text" placeholder="Cost of order" class="js-cost-input" onkeydown="
    handleKeyDown(event);  "> 
    <button onclick="
    calculateTotal();
    ">Calculate </button>
    <p class="js-total-cost"></p>
    <br><br><br>
    
    <a href="">CSS version of these Projects</a>
  <script>

    function handleKeyDown(event){
      if(event.key === 'Enter'){
        calculateTotal();
      }
    }
    function calculateTotal (){
     const inputElement = document.querySelector('.js-cost-input');
     let cost = Number(inputElement.value);
     if (cost < 40){
      cost = cost + 10;
     }
     document.querySelector('.js-total-cost').innerHTML = `$${cost}`;
     }
    function subscribe () {
      const buttonElement = document.querySelector('.js-button-subscribe');
        if (buttonElement.innerText === 'Subscribe'){
          buttonElement.innerText = 'Subscribed';
        }
        else {
          buttonElement.innerText = 'Subscribe';
        }
  }

    </script>
  </body>
</html>
