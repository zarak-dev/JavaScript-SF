<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variables</title>
</head>
<body>
  
  <script>
    let variable1 = 2;
    let variable2 = 5;
    let result = variable1 + variable2;
    console.log(result);
    
    let name = 'Zarak Khan';
    console.log(`my name is: ${name}`);

    const coffee = 5;
    const bagel = 3;
    const soup =  9;
    let cost = (coffee + (bagel*2) + soup);
    console.log('Cost: $'+(cost));
    let tax = (cost*0.1);
    console.log(`Tax(10%): $${tax}`);
    console.log(`Total: $${tax + cost}`);
    
    

  </script>
</body>
</html>
